    // --- FUNÇÕES HELPER ---
    function createElement(tag, classes, textContent, attributes = {}) {
        const element = document.createElement(tag);
        if (classes) element.className = classes;
        if (textContent) element.innerHTML = textContent;
        for (const key in attributes) {
            element.setAttribute(key, attributes[key]);
        }
        return element;
    }

    function createStatusBadge(statusKey, statusMap) {
        const statusInfo = statusMap[statusKey] || { text: "Indefinido", classes: "bg-gray-100 text-gray-800 border border-gray-200" };
        return createElement('span', `inline-block font-semibold rounded-full whitespace-nowrap px-3 py-1 text-xs ${statusInfo.classes}`, statusInfo.text);
    }

    function calculateDays(endDateStr) {
        if (!endDateStr) return '';
        const parts = endDateStr.split('/');
        if (parts.length !== 3) return '';
        const [day, month, year] = parts;
        const endDate = new Date(parseInt(year, 10), parseInt(month, 10) - 1, parseInt(day, 10), 23, 59, 59, 999);
        const now = new Date();
        const startOfToday = new Date(now.getFullYear(), now.getMonth(), now.getDate());
        const diffTime = endDate - startOfToday;
        const diffDays = Math.ceil(diffTime / (1000 * 60 * 60 * 24));

        if (diffDays > 1) { return `<span class="font-bold text-green-600">${diffDays} dias restantes</span>`; } 
        else if (diffDays === 1 || diffDays === 0) { return `<span class="font-bold text-orange-500">Último dia</span>`; } 
        else { return `<span class="text-gray-500 font-semibold">Encerrada</span>`; }
    }
    
    function isConsultaAberta(endDateStr) {
        if (!endDateStr) return false;
        const parts = endDateStr.split('/');
        if (parts.length !== 3) return false;
        const [day, month, year] = parts;
        const endDate = new Date(parseInt(year, 10), parseInt(month, 10) - 1, parseInt(day, 10), 23, 59, 59, 999);
        const now = new Date();
        return now <= endDate;
    }

    // DADOS DA AGENDA REGULATÓRIA (Temas e Anexos Aprovados)
    const agendaRegulatoriaThemes = [
        { title: "1. Novos modelos de negócio e inovação tecnológica", description: "O setor elétrico passa por transformações impulsionadas por novas tecnologias, compromissos de descarbonização e maior participação dos consumidores. A ANEEL busca eliminar barreiras regulatórias para fomentar um desenvolvimento de mercado equilibrado e garantir a modicidade tarifária." },
        { title: "2. Mercado de energia elétrica", description: "Com a abertura do mercado livre para todos os consumidores de alta tensão e a futura inclusão da baixa tensão, a ANEEL foca em aprimorar a regulação para assegurar a sustentabilidade do setor, a segurança do suprimento e a proteção dos consumidores, tratando de temas como migração, alocação de custos e modernização das regras de comercialização." },
        { title: "3. Operação e preço de curto prazo", description: "Este tema visa o aprimoramento contínuo dos modelos computacionais de otimização (NEWAVE, DECOMP) e de formação de preço (PLD), incorporando novas tecnologias como usinas híbridas e sistemas de armazenamento para refletir a complexidade crescente do sistema elétrico." },
        { title: "4. Contabilidade do setor elétrico", description: "Propõe-se a revisão e modernização dos manuais de contabilidade do setor elétrico para aumentar a transparência, a padronização e a comparabilidade das informações financeiras dos agentes, refletindo as novas dinâmicas do mercado." },
        { title: "5. Regulação de operações econômico-financeiras", description: "A ANEEL busca fortalecer o monitoramento da saúde financeira dos agentes, especialmente em um cenário de mercado mais aberto. O foco está na adequação de garantias financeiras e na gestão de riscos para garantir a liquidez e a segurança das operações." },
        { title: "6. Modernização da regulação econômica e das tarifas", description: "Este eixo trata da revisão das metodologias tarifárias de transmissão e distribuição, buscando maior eficiência, incentivos à qualidade e uma alocação de custos que considere novas tecnologias, como redes inteligentes e armazenamento de energia." },
        { title: "7. Novos contratos de concessão de transmissão e distribuição", description: "A agência se prepara para futuras licitações de concessão, desenvolvendo contratos que incentivem a modernização, a resiliência das redes e a melhoria contínua da qualidade dos serviços prestados à população." },
        { title: "8. Acesso e atendimento de usuários e consumidores", description: "O objetivo é simplificar as regras de acesso às redes, principalmente para a geração distribuída, e aprimorar os canais de atendimento e os mecanismos de proteção ao consumidor, garantindo um relacionamento mais justo e transparente." },
        { title: "9. Modernização do serviço de transmissão e distribuição", description: "A regulação buscará incorporar avanços como redes inteligentes (smart grids), digitalização, armazenamento e recursos energéticos distribuídos (REDs), visando aumentar a eficiência, a segurança e a flexibilidade da operação do sistema." },
        { title: "10. Eficiência energética", description: "Baseado em avaliações de resultados e recomendações do TCU, este tema foca no aprimoramento do Programa de Eficiência Energética (PEE) para otimizar a aplicação dos recursos e maximizar os benefícios socioeconômicos e ambientais." }

    function renderCircuito8Page(container) {

        const pageTitle = createElement('h1', 'page-title text-2xl sm:text-3xl font-bold mb-1', `Pauta do 8º Circuito Deliberativo de 2026`);
        const pageDate = createElement('p', 'text-gray-600 text-base mb-6', `Data da Reunião: ${circuito8DateText}`);
        container.appendChild(pageTitle);
        container.appendChild(pageDate);

        // Informação da Reunião
        const pautaInfoSection = createElement('div', 'mb-6 bg-i4-blue text-white p-5 rounded-xl flex items-center justify-between flex-wrap gap-4');
        const pautaText = createElement('p', 'text-lg font-semibold', 'Reunião Eletrônica (Assíncrona)');
        const pautaSubText = createElement('p', 'text-sm text-blue-100', 'Votação realizada no período estabelecido para o circuito.');
        const textDiv = createElement('div', '');
        textDiv.appendChild(pautaText);
        textDiv.appendChild(pautaSubText);
        
        const pautaLinkAnchor = createElement('a', 'bg-white text-i4-blue hover:bg-gray-100 font-bold py-2.5 px-5 rounded-lg transition-colors duration-300 flex items-center', `${icons.link} Pauta Oficial (PDF)`, { href: circuito8PautaLink, target: '_blank', rel: 'noopener noreferrer' });
        
        pautaInfoSection.appendChild(textDiv);
        pautaInfoSection.appendChild(pautaLinkAnchor);
        container.appendChild(pautaInfoSection);

            container.appendChild(emptyMessage);

        }

        // Sumário
        const summaryDiv = createElement('div', 'info-card mb-10');
        const summaryHeader = createElement('div', 'card-header p-5');
        summaryHeader.appendChild(createElement('h2', 'text-xl font-bold text-i4-dark-gray', 'Sumário da Pauta'));
        summaryDiv.appendChild(summaryHeader);

        const summaryList = createElement('ul', 'space-y-1 p-3');

        const getSummarySubject8 = (item) => {
            switch (item.originalItemNumber) {
                case 2: return "RTA Cemig Distribuição S.A. - Cemig-D";

    function renderRegulatoryTable(container, data, title, hasYearColumn = false) {
        const tableTitle = createElement('h3', 'text-xl font-bold text-i4-dark-gray mb-4 mt-8', title);
        container.appendChild(tableTitle);

        const tableContainer = createElement('div', 'info-card overflow-x-auto mb-10');
        const table = createElement('table', 'styled-table w-full text-sm text-left text-i4-text-gray');
        const thead = createElement('thead', 'text-xs text-i4-text-gray uppercase bg-i4-light-gray');
        const tbody = createElement('tbody', 'bg-white divide-y divide-i4-border-gray');

        let headerHtml = `
            <tr>
                <th scope="col" class="w-20 px-6 py-4">Eixo Temático</th>
                <th scope="col" class="w-20 px-6 py-4">Código</th>
        `;
        if (hasYearColumn) {
            headerHtml += `<th scope="col" class="w-32 px-6 py-4 text-center">Ano Previsto</th>`;
        }
        headerHtml += `<th scope="col" class="px-6 py-4">Atividade Regulatória</th></tr>`;
        thead.innerHTML = headerHtml;
        table.appendChild(thead);

        let currentEixo = null;
        data.forEach(item => {
            const tr = createElement('tr', 'hover:bg-i4-light-gray');
            
            let eixoCell = '';
            if (item.eixo !== currentEixo) {
                const rowSpanCount = data.filter(d => d.eixo === item.eixo).length;
                eixoCell = `<td class="px-6 py-4 font-semibold text-i4-blue align-middle" rowspan="${rowSpanCount}">${item.eixo}</td>`;
                currentEixo = item.eixo;
            }

            let yearCell = hasYearColumn ? `<td class="px-6 py-4 whitespace-nowrap font-medium text-i4-dark-gray text-center">${item.ano || '-'}</td>` : '';
            
            tr.innerHTML = `
                ${eixoCell}
                <td class="px-6 py-4 font-semibold text-i4-dark-gray">${item.codigo}</td>
                ${yearCell}
                <td class="px-6 py-4">${item.atividade}</td>
            `;
            tbody.appendChild(tr);
        });

        table.appendChild(tbody);
        tableContainer.appendChild(table);
        container.appendChild(tableContainer);
    }

        const introDiv = createElement('div', 'mb-6 bg-blue-50 p-6 rounded-xl border border-blue-200 mt-12');
        introDiv.innerHTML = `
            <h2 class="text-xl font-bold text-blue-800 mb-2">Histórico: 10 Temas Prioritários (Tomada de Subsídios nº 11/2025)</h2>
            <p class="text-blue-700">Durante a construção da agenda (via TS nº 11/2025), a ANEEL baseou-se em dez grandes temas prioritários para focar nos desafios e oportunidades do setor elétrico para o biênio.</p>
        `;
        container.appendChild(introDiv);
        
        const themesGrid = createElement('div', 'grid grid-cols-1 md:grid-cols-2 gap-4 mb-10');
        agendaRegulatoriaThemes.forEach(theme => {
            const card = createElement('div', 'info-card p-6 flex flex-col hover:shadow-md transition-shadow');
            card.innerHTML = `
                <h3 class="text-base font-bold text-i4-dark-gray mb-3">${theme.title}</h3>
                <p class="text-sm text-i4-text-gray leading-relaxed text-justify flex-grow">${theme.description}</p>
            `;
            themesGrid.appendChild(card);
        });
        container.appendChild(themesGrid);
    }

            { cidade: "São Paulo", data: "3 a 7 de agosto de 2026", local: "A definir", status: "Agendado" },
            { cidade: "Brasília", data: "30 de novembro a 3 de dezembro de 2026", local: "A definir", status: "Agendado" }
         ];

         imersoes.forEach(imersao => {
             const card = createElement('div', 'info-card flex flex-col h-full hover:shadow-lg transition-shadow duration-300');
             card.innerHTML = `
                <div class="card-header p-5 bg-i4-blue bg-opacity-10 border-b border-i4-blue border-opacity-20">
                     <h2 class="card-title text-xl font-bold text-i4-blue flex items-center">${icons.building} ${imersao.cidade}</h2>
                </div>
                <div class="p-6 space-y-4 flex-grow">
                    <div class="flex items-start">
                        <div class="bg-blue-100 rounded-full p-2 mr-3 text-i4-blue flex-shrink-0"><svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M8 7V3m8 4V3m-9 8h10M5 21h14a2 2 0 002-2V7a2 2 0 00-2-2H5a2 2 0 00-2 2v12a2 2 0 002 2z"></path></svg></div>
                        <div><p class="text-sm text-gray-500 font-semibold uppercase tracking-wider">Data</p><p class="text-i4-dark-gray font-medium text-lg">${imersao.data}</p></div>
                    </div>
                    <div class="flex items-start">
                        <div class="bg-blue-100 rounded-full p-2 mr-3 text-i4-blue flex-shrink-0"><svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M17.657 16.657L13.414 20.9a1.998 1.998 0 01-2.827 0l-4.244-4.243a8 8 0 1111.314 0z"></path><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M15 11a3 3 0 11-6 0 3 3 0 016 0z"></path></svg></div>
                        <div><p class="text-sm text-gray-500 font-semibold uppercase tracking-wider">Local</p><div class="text-i4-dark-gray font-medium text-base leading-snug">${imersao.local}</div></div>
                    </div>
                    ${imersao.horario ? `
                    <div class="flex items-start">
                        <div class="bg-blue-100 rounded-full p-2 mr-3 text-i4-blue flex-shrink-0"><svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 8v4l3 3m6-3a9 9 0 11-18 0 9 9 0 0118 0z"></path></svg></div>
                        <div><p class="text-sm text-gray-500 font-semibold uppercase tracking-wider">Horário</p><p class="text-i4-dark-gray font-medium text-base">${imersao.horario}</p></div>
                    </div>` : ''}
                </div>
                <div class="card-footer p-4 text-center bg-gray-50"><span class="inline-flex items-center px-3 py-1 rounded-full text-xs font-medium bg-green-100 text-green-800">${imersao.status}</span></div>
             `;
             grid.appendChild(card);
         });
         container.appendChild(grid);

         const logisticsDiv = createElement('div', 'mb-10 bg-blue-50 p-6 rounded-xl border border-blue-200 flex flex-col md:flex-row items-center justify-between gap-6');
         logisticsDiv.innerHTML = `
            <div class="flex-1 text-center md:text-left">
                <h3 class="text-lg font-bold text-blue-900 mb-2">Logística de Viagem</h3>
                <p class="text-blue-800 text-sm">Por favor, preencha as planilhas de passagens correspondentes ao seu trecho.</p>

                <a href="https://docs.google.com/spreadsheets/d/1yoYBqXJH7QGZu6b0WYMrf21F6u3cn29KliKH25ZYg1M/edit#gid=0" target="_blank" class="bg-blue-600 hover:bg-blue-700 text-white font-bold py-3 px-6 rounded-lg transition-colors flex items-center justify-center shadow-sm text-sm whitespace-nowrap">${icons.link} Planilha SP ➔ BSB</a>

            </div>
         `;
         container.appendChild(logisticsDiv);
    }

    // --- SETUP PRINCIPAL ---
    function renderApp() {
      const appContainer = document.getElementById('app-container');
      
      const header = createElement('header', 'bg-white shadow-md p-5 sticky top-0 z-20');
      const headerContent = createElement('div', 'container mx-auto flex flex-col md:flex-row items-center justify-between gap-4');
      const logoImg = createElement('img', 'h-12 w-auto', null, { src: i4LogoUrl, alt: 'i4 Logo', onerror: "this.style.display='none';" });
      headerContent.appendChild(logoImg);

      const navContainer = createElement('div', 'flex flex-wrap gap-2 justify-center md:justify-start');
      
      const circuito8Button = createElement('button', 'nav-button-base nav-button-inactive', 'Pauta 8º Circuito');
      const pauta10Button = createElement('button', 'nav-button-base nav-button-inactive', 'Resultados 10ª RPO');
      const consultasButton = createElement('button', 'nav-button-base nav-button-inactive', 'Consultas e Subsídios');
      const agendaButton = createElement('button', 'nav-button-base nav-button-inactive', 'Agenda Regulatória');
      const imersaoButton = createElement('button', 'nav-button-base nav-button-inactive', 'Imersões 2026');

      navContainer.append(circuito8Button, pauta10Button, consultasButton, agendaButton, imersaoButton);
      headerContent.appendChild(navContainer);
      header.appendChild(headerContent);
      appContainer.appendChild(header);
      
      const main = createElement('main', 'container mx-auto p-6 md:p-10');
      const contentContainer = createElement('div', 'mt-4');
      main.appendChild(contentContainer);
      appContainer.appendChild(main);

      const footer = createElement('footer', 'text-center mt-12 p-8 text-gray-500 text-sm border-t border-gray-200');
      footer.innerHTML = `© 2026 i4 Economic Regulation. Todos os direitos reservados.`;
      appContainer.appendChild(footer);

      const buttons = [circuito8Button, pauta10Button, consultasButton, agendaButton, imersaoButton];
      function setActiveButton(activeBtn) {
          buttons.forEach(btn => { btn.classList.remove('nav-button-active'); btn.classList.add('nav-button-inactive'); });
          activeBtn.classList.add('nav-button-active'); activeBtn.classList.remove('nav-button-inactive');
      }

      circuito8Button.addEventListener('click', () => { setActiveButton(circuito8Button); renderPageWithAnimation(renderCircuito8Page, contentContainer); });
      pauta10Button.addEventListener('click', () => { setActiveButton(pauta10Button); renderPageWithAnimation(renderPauta10Page, contentContainer); });
      consultasButton.addEventListener('click', () => { setActiveButton(consultasButton); renderPageWithAnimation(renderConsultasPage, contentContainer); });
      agendaButton.addEventListener('click', () => { setActiveButton(agendaButton); renderPageWithAnimation(renderAgendaRegulatoriaPage, contentContainer); });
      imersaoButton.addEventListener('click', () => { setActiveButton(imersaoButton); renderPageWithAnimation(renderImersaoPage, contentContainer); });

      // Inicia na Pauta do 8º Circuito como primeira aba
      setActiveButton(circuito8Button);
      renderPageWithAnimation(renderCircuito8Page, contentContainer);
    }

    document.addEventListener('DOMContentLoaded', renderApp);
  </script>
